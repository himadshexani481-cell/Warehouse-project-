<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYD Warehouse System</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 600px; margin: auto; border-top: 5px solid #d32f2f; }
        h2 { color: #d32f2f; margin-bottom: 20px; }
        label { display: block; text-align: right; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #b71c1c; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #d32f2f; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        #loading { display: none; color: #666; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body onload="loadData()">

<div class="container">
    <h2>BYD Inventory Control</h2>
    
    <label>ژمارەی شاسی (VIN):</label>
    <input type="text" id="chassisInput" placeholder="بۆ نموونە: LC01234...">
    
    <label>باری سەیارە (Status):</label>
    <select id="statusSelect">
        <option value="In Stock">In Stock</option>
        <option value="Out to Grand">Out to Grand</option>
        <option value="Dispatched">Dispatched</option>
    </select>
    
    <label>تێبینی یان دامەج:</label>
    <input type="text" id="damageInput" placeholder="وەسفی بارودۆخەکە بنووسە...">
    
    <button id="saveBtn" onclick="saveData()">پاشەکەوتکردن</button>
    <div id="loading">کەمێک چاوەڕێ بکە... خەریکی کارە...</div>

    <hr>
    <h3>لیستی مەخزەن (Live)</h3>
    <table>
        <thead>
            <tr>
                <th>شاسی</th>
                <th>دۆخ</th>
                <th>تێبینی</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="3">خەریکی هێنانی زانیارییەکانە...</td></tr>
        </tbody>
    </table>
</div>

<script>
// لینکە نوێیەکەت کە ئێستا ناردی
const scriptURL = 'https://script.google.com/macros/s/AKfycbyQ0Ax_Ubmb9sr3j723KD4PSJLws1szjqRcnGll7WSvEZkvl_xvVLZKW5ea2qmyEoN3/exec';

// هێنانی داتاکان لە Google Sheetsـەوە کاتێک سایتەکە دەکرێتەوە
async function loadData() {
    try {
        const response = await fetch(scriptURL);
        const data = await response.json();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 
        
        data.reverse().forEach(row => { 
            const tr = `<tr><td>${row.chassis}</td><td>${row.status}</td><td>${row.damage}</td></tr>`;
            tbody.innerHTML += tr;
        });
    } catch (error) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="3">هیچ داتایەک نییە یان کێشەیەک هەیە</td></tr>';
    }
}

// ناردنی داتای نوێ
async function saveData() {
    const chassis = document.getElementById('chassisInput').value;
    const status = document.getElementById('statusSelect').value;
    const damage = document.getElementById('damageInput').value;
    const saveBtn = document.getElementById('saveBtn');
    const loading = document.getElementById('loading');

    if(!chassis) {
        alert("تکایە ژمارەی شاسی بنووسە!");
        return;
    }

    saveBtn.disabled = true;
    loading.style.display = 'block';

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ chassis, status, damage })
        });
        
        alert("بە سەرکەوتوویی تۆمار کرا! ✅");
        location.reload(); // سایتەکە نوێ دەکاتەوە بۆ ئەوەی داتاکە لە لیستەکەدا دەربکەوێت
        
    } catch (error) {
        alert("کێشەیەک ڕوویدا، دووبارە تاقی بکەرەوە.");
        saveBtn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
