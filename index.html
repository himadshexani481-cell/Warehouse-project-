<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی مەخزەنی BYD</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #f4f4f4; padding: 20px; text-align: center; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 400px; margin: auto; border-top: 5px solid #d32f2f; }
        h2 { color: #d32f2f; margin-bottom: 20px; }
        label { display: block; text-align: right; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #b71c1c; }
        #loading { display: none; color: #666; font-style: italic; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>BYD Warehouse</h2>
    
    <label>ژمارەی شاسی (VIN):</label>
    <input type="text" id="chassisInput" placeholder="بۆ نموونە: LC01234...">
    
    <label>باری سەیارە (Status):</label>
    <select id="statusSelect">
        <option value="In Stock">In Stock</option>
        <option value="Out to Grand">Out to Grand</option>
        <option value="Dispatched">Dispatched</option>
    </select>
    
    <label>تێبینی:</label>
    <input type="text" id="damageInput" placeholder="وەسفی بارودۆخەکە بنووسە...">
    
    <button id="saveBtn" onclick="saveData()">پاشەکەوتکردن</button>
    <div id="loading">خەریکی ناردنە...</div>
</div>

<script>
async function saveData() {
    const chassis = document.getElementById('chassisInput').value;
    const status = document.getElementById('statusSelect').value;
    const damage = document.getElementById('damageInput').value;
    const saveBtn = document.getElementById('saveBtn');
    const loading = document.getElementById('loading');
    
    // لینکە نوێیەکەت کە بە سەرکەوتوویی دروستت کرد
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyQ0Ax_Ubmb9sr3j723KD4PSJLws1szjqRcnGll7WSvEZkvl_xvVLZKW5ea2qmyEoN3/exec';

    if(!chassis) {
        alert("تکایە ژمارەی شاسی بنووسە!");
        return;
    }

    saveBtn.disabled = true;
    loading.style.display = 'block';

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ chassis, status, damage })
        });
        
        alert("بە سەرکەوتوویی تۆمار کرا! ✅");
        document.getElementById('chassisInput').value = '';
        document.getElementById('damageInput').value = '';
        
    } catch (error) {
        alert("کێشەیەک ڕوویدا، دووبارە تاقی بکەرەوە.");
    } finally {
        saveBtn.disabled = false;
        loading.style.display = 'none';
    }
}
</script>

</body>
</html>
